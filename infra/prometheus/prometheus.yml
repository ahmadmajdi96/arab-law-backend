global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - api
        type: A
        port: 3000

  - job_name: traefik
    static_configs:
      - targets:
          - traefik:8080

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: backend-probes
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api:3000/health
          - http://api:3000/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: frontend-probes
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:5173
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
