name: arab-law-backend

x-api-common: &api-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    NODE_ENV: production
    DATABASE_URL: ${DATABASE_URL:-postgres://arab_law:arab_law_password@postgres:5432/arab_law}
    DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
    JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-change-before-production}
    S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
    S3_REGION: ${S3_REGION:-us-east-1}
    S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-arab-law-minio}
    S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-arab-law-minio-password}
    S3_BUCKET: ${S3_BUCKET:-documents}
    S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    REDIS_URL: redis://redis:6379
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
    otel-collector:
      condition: service_started
  networks:
    - public
    - internal
    - monitoring
  restart: unless-stopped

services:
  traefik:
    image: traefik:v3.2.0
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --accesslog=true
      - --metrics.prometheus=true
      - --metrics.prometheus.addrouterslabels=true
      - --metrics.prometheus.addserviceslabels=true
    ports:
      - "5556:80"
      - "5557:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public
      - monitoring
    restart: unless-stopped

  api:
    <<: *api-common
    labels:
      - traefik.enable=true
      - traefik.docker.network=arab-law-backend_public
      - traefik.http.routers.api.rule=PathPrefix(`/`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=3000
      - traefik.http.middlewares.api-compress.compress=true
      - traefik.http.middlewares.api-secure.headers.contentTypeNosniff=true
      - traefik.http.middlewares.api-secure.headers.browserXssFilter=true
      - traefik.http.routers.api.middlewares=api-compress,api-secure
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: test
      LOG_LEVEL: silent
      DATABASE_URL: ${DATABASE_URL:-postgres://arab_law:arab_law_password@postgres:5432/arab_law}
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-change-before-production}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-arab-law-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-arab-law-minio-password}
      S3_BUCKET: ${S3_BUCKET:-documents}
      QUEUE_ENABLED: "false"
      OTEL_ENABLED: "false"
      RATE_LIMIT_MAX: "10000000"
      RATE_LIMIT_WINDOW: "1 minute"
    working_dir: /app
    volumes:
      - .:/app
      - test-node-modules:/app/node_modules
    networks:
      - public
      - internal
      - monitoring

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    profiles:
      - migrate
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://arab_law:arab_law_password@postgres:5432/arab_law}
    working_dir: /app
    command: ["npm", "run", "db:migrate"]
    volumes:
      - .:/app
      - test-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  worker:
    <<: *api-common
    command: ["node", "dist/src/worker.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=false
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arab_law}
      POSTGRES_USER: ${POSTGRES_USER:-arab_law}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arab_law_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./drizzle:/docker-entrypoint-initdb.d:ro
    ports:
      - "5567:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
      - monitoring
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-arab_law}:${POSTGRES_PASSWORD:-arab_law_password}@postgres:5432/${POSTGRES_DB:-arab_law}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - monitoring
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-arab-law-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-arab-law-minio-password}
    volumes:
      - minio-data:/data
    ports:
      - "5568:9000"
      - "5569:9001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
      - monitoring
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID:-arab-law-minio}" "$${S3_SECRET_ACCESS_KEY:-arab-law-minio-password}" &&
        mc mb --ignore-existing local/"$${S3_BUCKET:-documents}" &&
        mc anonymous set none local/"$${S3_BUCKET:-documents}"
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-arab-law-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-arab-law-minio-password}
      S3_BUCKET: ${S3_BUCKET:-documents}
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    networks:
      - internal
      - monitoring
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - monitoring
      - internal
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "5558:9090"
    networks:
      - monitoring
      - public
      - internal
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "5559:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    ports:
      - "5560:3100"
    networks:
      - monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.1
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "5561:3200"
      - "5562:4317"
    networks:
      - monitoring
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./infra/otel/collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "5563:4318"
      - "5564:8889"
    depends_on:
      - tempo
    networks:
      - monitoring
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "5565:8080"
    networks:
      - monitoring
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro
    networks:
      - monitoring
    restart: unless-stopped

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    command: ["--config.file=/etc/blackbox/blackbox.yml"]
    volumes:
      - ./infra/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - "5566:9115"
    networks:
      - monitoring
      - public
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  test-node-modules:

networks:
  public:
  internal:
    internal: true
  monitoring:
